name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK (Linux)
        run: |
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-1.3.296.list https://packages.lunarg.com/vulkan/1.3.296/lunarg-vulkan-1.3.296-jammy.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Compile Shaders
        run: python3 scripts/compile_shaders.py

      - name: Build (Release)
        run: cargo build --release --bin train_transformer_full

      - name: Prepare Artifact
        run: |
          mkdir -p release-linux
          cp target/release/train_transformer_full release-linux/hlx-train
          cp target/release/hlx_shader_compiler release-linux/hlx-compile || true
          cp README.md release-linux/
          cp LICENSE release-linux/
          tar -czvf hlx-linux-x64.tar.gz -C release-linux .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hlx-linux-x64
          path: hlx-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK (Windows)
        run: choco install vulkan-sdk

      - name: Compile Shaders
        run: python scripts/compile_shaders.py

      - name: Build (Release)
        run: cargo build --release --bin train_transformer_full

      - name: Prepare Artifact
        run: |
          mkdir release-windows
          copy target\release\train_transformer_full.exe release-windows\hlx-train.exe
          copy target\release\hlx_shader_compiler.exe release-windows\hlx-compile.exe
          copy README.md release-windows\
          copy LICENSE release-windows\
          7z a hlx-windows-x64.zip .\release-windows\*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hlx-windows-x64
          path: hlx-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: hlx-linux-x64
          path: .
      
      - uses: actions/download-artifact@v4
        with:
          name: hlx-windows-x64
          path: .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            hlx-linux-x64.tar.gz
            hlx-windows-x64.zip
          draft: false
          prerelease: false
